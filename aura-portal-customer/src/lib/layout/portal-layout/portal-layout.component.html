<div class="min-h-screen bg-slate-50 flex flex-col md:flex-row text-slate-800 font-sans">
  <!-- Sidebar / Menú Lateral "Atrium Style" -->
  <aside class="w-full md:w-64 bg-white border-r border-slate-200 flex flex-col pt-8">
    
    <!-- Logo / Brand Header -->
    <div class="px-8 mb-8">
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Mi Espacio</h1>
      <p class="text-[10px] font-bold text-slate-400 tracking-widest uppercase mt-1">Portal de Cliente</p>
    </div>

    <!-- CTA Button -->
    <div class="px-6 mb-8">
      <button class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3 rounded-xl flex items-center justify-center gap-2 transition-colors shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
        <span>Ir a la tienda</span>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 space-y-1">
      
      <!-- Dashboard -->
      <a routerLink="dashboard" routerLinkActive="border-slate-800 bg-slate-50 text-slate-900 font-semibold" 
         [routerLinkActiveOptions]="{exact: true}"
         class="flex items-center gap-3 px-8 py-3.5 border-l-4 border-transparent text-slate-500 hover:bg-slate-50 hover:text-slate-800 transition-colors text-sm font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zM5 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zM11 5a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V5zM11 13a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
        <span>Resumen</span>
      </a>

      <!-- Orders -->
      <a routerLink="orders" routerLinkActive="border-slate-800 bg-slate-50 text-slate-900 font-semibold" 
         class="flex items-center gap-3 px-8 py-3.5 border-l-4 border-transparent text-slate-500 hover:bg-slate-50 hover:text-slate-800 transition-colors text-sm font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 2a4 4 0 00-4 4v1H5a1 1 0 00-.994.89l-1 9A1 1 0 004 18h12a1 1 0 00.994-1.11l-1-9A1 1 0 0015 7h-1V6a4 4 0 00-4-4zm2 5V6a2 2 0 10-4 0v1h4zm-6 3a1 1 0 112 0 1 1 0 01-2 0zm7-1a1 1 0 100 2 1 1 0 000-2z" clip-rule="evenodd" /></svg>
        <span>Mis Pedidos</span>
      </a>

      <!-- Rewards -->
      <a routerLink="rewards" routerLinkActive="border-slate-800 bg-slate-50 text-slate-900 font-semibold" 
         class="flex items-center gap-3 px-8 py-3.5 border-l-4 border-transparent text-slate-500 hover:bg-slate-50 hover:text-slate-800 transition-colors text-sm font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 4a2 2 0 00-2 2v4a2 2 0 002 2V6h10a2 2 0 00-2-2H4zm2 6a2 2 0 012-2h8a2 2 0 012 2v4a2 2 0 01-2 2H8a2 2 0 01-2-2v-4zm6 4a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" /></svg>
        <span>Mis Recompensas</span>
      </a>

      <!-- Addresses -->
      <a routerLink="addresses" routerLinkActive="border-slate-800 bg-slate-50 text-slate-900 font-semibold" 
         class="flex items-center gap-3 px-8 py-3.5 border-l-4 border-transparent text-slate-500 hover:bg-slate-50 hover:text-slate-800 transition-colors text-sm font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" /></svg>
        <span>Direcciones</span>
      </a>

      <!-- Settings -->
      <a routerLink="settings" routerLinkActive="border-slate-800 bg-slate-50 text-slate-900 font-semibold" 
         class="flex items-center gap-3 px-8 py-3.5 border-l-4 border-transparent text-slate-500 hover:bg-slate-50 hover:text-slate-800 transition-colors text-sm font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd" /></svg>
        <span>Ajustes</span>
      </a>

    </nav>
  </aside>

  <!-- Contenido Principal Dinámico -->
  <main class="flex-1 p-6 md:p-10 lg:p-12 overflow-y-auto">
    <!-- Top action bar (Search + Notifications, Optional for future) -->
    <header class="w-full flex justify-end mb-8 items-center gap-4 text-slate-400">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 cursor-pointer hover:text-slate-800 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
    </header>

    <router-outlet></router-outlet>
  </main>
</div>
