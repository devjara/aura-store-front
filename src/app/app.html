<app-navbar [categories]="mockCategories" [cartItemCount]="2" />

<main class="mx-auto flex min-h-screen max-w-7xl flex-col gap-8 px-4 py-8 sm:px-6 md:flex-row lg:px-8">
  
  <aside class="w-full md:w-1/4">
    <app-filter 
      [categories]="mockCategories" 
      [isLoading]="false"
      (onFilterApply)="onFilterApplied($event)" />
  </aside>

  <section class="flex-1">
    
    <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
      @for (product of mockProducts; track product.id) {
        <app-product-card 
          [product]="product" 
          (onAddToCart)="onProductAdded($event)" />
      }
    </div>

    <div class="mt-8">
      <app-pagination 
        [currentPage]="1" 
        [totalPages]="5" 
        (onPageChange)="onPageChanged($event)" />
    </div>

  </section>

</main>

<app-footer />
