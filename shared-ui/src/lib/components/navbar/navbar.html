<header class="sticky top-0 z-50 w-full border-b border-gray-200 bg-white shadow-sm">
  <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
    
    <div class="flex items-center gap-2">
      <a routerLink="/" class="text-2xl font-black tracking-tighter text-blue-600">
        AURA<span class="text-gray-900">.</span>
      </a>
    </div>

    <nav class="hidden md:flex md:gap-6">
      <a routerLink="/catalog" class="text-sm font-semibold text-gray-700 hover:text-blue-600">
        Todo el Catálogo
      </a>
      
      @for (category of categories(); track category.id) {
        <a [routerLink]="['/category', category.id]" class="text-sm font-semibold text-gray-700 transition-colors hover:text-blue-600">
          {{ category.name }}
        </a>
      }
    </nav>

    <div class="flex items-center gap-4">
      
      <form (submit)="handleSearch($event)" class="hidden lg:block relative">
        <input 
          type="text" 
          name="searchInput"
          placeholder="Buscar productos..." 
          class="w-64 rounded-full border border-gray-300 bg-gray-50 py-1.5 pl-4 pr-10 text-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
        />
        <button type="submit" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-600">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </button>
      </form>

      <a routerLink="/login" class="text-gray-600 hover:text-blue-600">
        <span class="sr-only">Mi Cuenta</span>
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      </a>

      <a routerLink="/cart" class="relative text-gray-600 hover:text-blue-600">
        <span class="sr-only">Carrito</span>
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
        
        @if (cartItemCount() > 0) {
          <span class="absolute -right-2 -top-2 flex h-5 w-5 items-center justify-center rounded-full bg-red-600 text-[10px] font-bold text-white">
            {{ cartItemCount() }}
          </span>
        }
      </a>
    </div>

  </div>
</header>
