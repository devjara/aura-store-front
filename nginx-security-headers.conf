# nginx-security-headers.conf
# =============================================================================
# Aura Market — Configuración de Headers de Seguridad HTTP
# Alineado con: CONDUSEF / PCI-DSS v4.0 / OWASP Secure Headers Project
# =============================================================================
# INSTRUCCIONES: Incluir este archivo en el bloque `server {}` de nginx.conf:
#   include /etc/nginx/conf.d/nginx-security-headers.conf;
# =============================================================================

# ── HSTS — HTTP Strict Transport Security ────────────────────────────────────
# Fuerza HTTPS durante 1 año (31,536,000 segundos).
# `preload` permite registrar el dominio en la lista HSTS de navegadores.
# REQUISITO CONDUSEF: El sitio debe operar exclusivamente bajo HTTPS.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# ── Anti-Clickjacking ─────────────────────────────────────────────────────────
# Previene que el Checkout sea embebido en iFrames de terceros (Clickjacking).
add_header X-Frame-Options "SAMEORIGIN" always;

# ── Anti-MIME Sniffing ────────────────────────────────────────────────────────
# Evita que el navegador "adivine" el Content-Type (MIME Confusion Attack).
add_header X-Content-Type-Options "nosniff" always;

# ── Referrer Policy ───────────────────────────────────────────────────────────
# Solo envía la URL de origen al mismo dominio. No filtra info a SDKs externos.
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ── Permissions Policy ────────────────────────────────────────────────────────
# Deshabilita APIs del navegador no necesarias para el e-commerce.
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;

# ── Content Security Policy (CSP) ─────────────────────────────────────────────
# Solo acepta scripts/frames de dominios autorizados (MercadoPago + PayPal).
# Bloquea cualquier script inyectado dinámicamente desde dominios no listados.
add_header Content-Security-Policy "
  default-src 'self';
  script-src 'self'
    'unsafe-inline'
    https://sdk.mercadopago.com
    https://www.paypal.com
    https://www.sandbox.paypal.com
    https://www.paypalobjects.com;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src 'self' https://fonts.gstatic.com;
  img-src 'self' data: https: blob:;
  frame-src
    https://www.mercadopago.com
    https://www.mercadopago.com.mx
    https://www.paypal.com
    https://www.sandbox.paypal.com;
  connect-src 'self'
    https://api.mercadopago.com
    https://api.sandbox.paypal.com
    https://www.sandbox.paypal.com
    https://www.paypal.com;
  object-src 'none';
  base-uri 'self';
  form-action 'self';
  upgrade-insecure-requests;
" always;

# ── TLS: Solo versiones modernas ──────────────────────────────────────────────
# Deshabilitar SSLv3, TLS 1.0, TLS 1.1 (inseguros y no soportados por PCI-DSS)
ssl_protocols TLSv1.2 TLSv1.3;

# ── Cipher Suites Seguros ─────────────────────────────────────────────────────
ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
ssl_prefer_server_ciphers on;

# ── OCSP Stapling ─────────────────────────────────────────────────────────────
# Respuesta inmediata de revocación de certificados. Evita latencia en TLS handshake.
ssl_stapling on;
ssl_stapling_verify on;
resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

# ── Session Tickets ───────────────────────────────────────────────────────────
# Deshabilitado para prevenir ataques de resumption de sesión TLS.
ssl_session_tickets off;
ssl_session_timeout 10m;
