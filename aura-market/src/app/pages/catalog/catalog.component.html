<div class="max-w-7xl mx-auto px-6 py-12 flex flex-col md:flex-row gap-12">

  <aura-filter
    [filters]="filterConfigs()"
    [currentState]="catalog.filterState()"
    (stateChange)="catalog.filterState.set($event)">
  </aura-filter>

  <main class="flex-1">
    <div class="mb-6 text-sm text-gray-500">
      Mostrando {{ catalog.filteredItems().length }} productos
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (product of catalog.filteredItems(); track product.id) {
        <div class="group cursor-pointer">
          <div class="aspect-[4/5] bg-gray-50 rounded-2xl mb-4 overflow-hidden">
            <img
              [src]="product.imageUrl"
              [alt]="product.name"
              class="object-cover w-full h-full group-hover:scale-105 transition-transform duration-500"
            >
          </div>
          <h3 class="font-medium text-gray-900 truncate">{{ product.name }}</h3>
          <p class="text-gray-500">${{ product.price }}</p>
        </div>
      }
    </div>

    @if (catalog.filteredItems().length === 0 && products().length > 0) {
      <div class="text-center py-20 text-gray-500">
        No se encontraron productos con estos filtros.
      </div>
    }
  </main>

</div>
